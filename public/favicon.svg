<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311b92"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Rounded Rect Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer Glow Border -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#iconGrad)" stroke-width="8" opacity="0.4"/>

  <!-- Main Beaker / Lab Icon -->
  <g transform="translate(106, 86)" filter="url(#glow)">
    <!-- Flask / Beaker Body -->
    <path d="M 120 40 L 180 40 L 180 120 L 260 260 C 280 295 255 340 210 340 L 90 340 C 45 340 20 295 40 260 L 120 120 Z" 
          fill="none" stroke="url(#iconGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Flask Liquid Level -->
    <path d="M 70 240 C 110 220, 190 260, 230 240 L 210 290 C 200 320, 100 320, 90 290 Z" 
          fill="url(#iconGrad)" opacity="0.8"/>
    
    <!-- Sparkle Stars -->
    <path d="M 230 80 L 235 95 L 250 100 L 235 105 L 230 120 L 225 105 L 210 100 L 225 95 Z" fill="#f59e0b"/>
    <path d="M 70 110 L 73 120 L 83 123 L 73 126 L 70 136 L 67 126 L 57 123 L 67 120 Z" fill="#6366f1"/>
  </g>
</svg>